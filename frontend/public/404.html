<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Eptain AI - Future of Insurance</title>
    <script type="text/javascript">
      // GitHub Pages SPA hack to enable direct linking to routes
      var pathSegmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
